<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema - Personal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent: #14b8a6;
            --btn-navy: #1e3a8a;
        }
        body {
            background-color: var(--bg-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            margin: 0;
            color: #f8fafc;
        }
        .login-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .brand-badge {
            width: 60px;
            height: 60px;
            background: rgba(20, 184, 166, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: var(--accent);
            font-size: 24px;
            border: 1px solid rgba(20, 184, 166, 0.2);
        }
        .form-control-custom {
            background: #0f172a!important;
            border: 1px solid #334155!important;
            color: #f8fafc!important;
            border-radius: 8px;
            padding: 12px;
            font-size: 0.95rem;
        }
        .form-control-custom:focus {
            border-color: var(--accent)!important;
            box-shadow: 0 0 0 2px rgba(20, 184, 166, 0.2)!important;
        }
        .btn-submit {
            background: var(--btn-navy);
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .btn-submit:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }
        .alert-custom {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            font-size: 0.85rem;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <div class="brand-badge"><i class="fa-solid fa-shield-halved"></i></div>
            <h4 class="fw-bold m-0">Control de Acceso</h4>
            <p class="text-muted small mt-1">Inicie sesión para acceder al registro</p>
        </div>
        <div id="errorMsg" class="alert alert-custom d-none" role="alert">
            <i class="fa-solid fa-circle-exclamation me-2"></i>Usuario o contraseña incorrectos.
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label small text-muted fw-semibold">Nombre de Usuario</label>
                <input type="text" id="userInput" class="form-control form-control-custom" placeholder="Ej: admin" required autocomplete="off">
            </div>
            <div class="mb-4">
                <label class="form-label small text-muted fw-semibold">Contraseña</label>
                <input type="password" id="passInput" class="form-control form-control-custom" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-submit w-100">Autenticar e Ingresar</button>
        </form>
    </div>

    <script>
        // Si el usuario ya está autenticado, saltar directo al buscador
        if(localStorage.getItem('auth_session_token') === 'active') { window.location.href = 'buscar.html'; }

        document.getElementById('loginForm').onsubmit = async function(e) {
            e.preventDefault();
            const u = document.getElementById('userInput').value.trim();
            const p = document.getElementById('passInput').value;
            
            // Verificación criptográfica local SHA-256
            const msgBuffer = new TextEncoder().encode(p);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');

            // Validar credenciales: admin / gda2026
            if(u === 'admin' && hashHex === '68c9bc88c1cfa159be1f600f68d60cda25244be2bf45b1219b109b0a1f0980b1') {
                localStorage.setItem('auth_session_token', 'active');
                window.location.href = 'buscar.html';
            } else {
                const err = document.getElementById('errorMsg');
                err.classList.remove('d-none');
                document.getElementById('passInput').value = '';
            }
        };
    </script>
</body>
</html>
