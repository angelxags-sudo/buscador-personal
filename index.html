<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Consulta de Personal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-accent-bar"></div>
    <div class="container-fluid app-container">
        
        <!-- Header simplificado y adaptativo para móvil -->
        <header class="system-header d-flex flex-column flex-sm-row justify-content-between align-items-center gap-3">
            <div class="d-flex align-items-center gap-3 w-100 justify-content-center justify-content-sm-start">
                <div class="brand-badge"><i class="fa-solid fa-users-gear"></i></div>
                <div class="text-center text-sm-start">
                    <h1 class="system-main-title">Consulta de Personal</h1>
                    <p class="system-tagline m-0">Base de Datos Institucional Permanente</p>
                </div>
            </div>
        </header>

        <!-- Panel de Filtros optimizado para pantallas táctiles -->
        <div class="search-panel-card mb-4">
            <div class="row g-3">
                <div class="col-12 col-md-4">
                    <label class="filter-label"><i class="fa-solid fa-user me-2"></i>Apellidos y Nombres</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-font field-icon"></i>
                        <input type="text" id="searchName" class="form-control field-custom" placeholder="Buscar por nombre..." autocomplete="off">
                    </div>
                </div>
                <div class="col-12 col-sm-6 col-md-3">
                    <label class="filter-label"><i class="fa-solid fa-id-card me-2"></i>Código Funcionario</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-barcode field-icon"></i>
                        <input type="text" id="searchCode" class="form-control field-custom" placeholder="Código..." autocomplete="off">
                    </div>
                </div>
                <div class="col-12 col-sm-6 col-md-3">
                    <label class="filter-label"><i class="fa-solid fa-award me-2"></i>Grado o Escalafón</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-layer-group field-icon"></i>
                        <input type="text" id="searchGrado" class="form-control field-custom" placeholder="Grado..." autocomplete="off">
                    </div>
                </div>
                <div class="col-12 col-md-2">
                    <button id="resetFilters" class="btn btn-reset-custom w-100" type="button">
                        <i class="fa-solid fa-filter-circle-xmark me-2"></i>Limpiar
                    </button>
                </div>
            </div>
        </div>

        <!-- Panel de Datos con Scroll Nativo Suave para Celular -->
        <div class="card data-panel-card">
            <div class="card-header-custom d-flex flex-column flex-sm-row justify-content-between align-items-center gap-2">
                <div class="panel-info-title"><i class="fa-solid fa-database text-teal me-2"></i>Registros Oficiales</div>
                <div class="panel-status-counter">
                    <span class="status-indicator-dot"></span>
                    <span id="totalCounter" class="counter-text">Cargando registros...</span>
                </div>
            </div>
            <div class="card-body p-0">
                <div class="table-container-mobile">
                    <table id="personalTable" class="table table-striped table-hover w-100 m-0">
                        <thead>
                            <tr>
                                <th>N.Ord</th>
                                <th>Escalafón</th>
                                <th>Grado</th>
                                <th>Apellidos y Nombres</th>
                                <th>Cód. Funcionario</th>
                                <th>Estado Civil</th>
                                <th>Fecha Nacimiento</th>
                                <th>Fecha Ingreso</th>
                                <th>Fecha Ascenso</th>
                                <th>Observaciones</th>
                                <th>Observaciones 2</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
